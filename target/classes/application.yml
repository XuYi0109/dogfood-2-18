server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: charging-station-api
  datasource:
    url: jdbc:mysql://localhost:3306/charging_station_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: xuyi2633
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.chargingstation.entity
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

logging:
  level:
    com.chargingstation.mapper: debug
    org.springframework.web: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
